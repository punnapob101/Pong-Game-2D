<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            text-align: center;
            /* Modern fallback gradient */
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            background-image: url('stadium.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
            color: #fff;
        }

        /* Glassmorphism wrapper overlay to make text readable */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: -1;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 60px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeIn 1s ease-out;
            max-width: 90vw;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 15px rgba(0, 242, 254, 0.3);
            margin-bottom: 10px;
        }

        p.instructions {
            font-size: 1.2rem;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f0f0f0;
            max-width: 600px;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .highlight {
            color: #00f2fe;
            font-weight: 600;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border: 3px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #000;
        }

        canvas:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 50px rgba(0, 242, 254, 0.2);
            border-color: rgba(0, 242, 254, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="game-container">
        <h1>เกมปิงปอง</h1>
        <p class="instructions">ควบคุมผู้เล่นฝั่งซ้ายโดยใช้ปุ่มลูกศร <span class="highlight">ขึ้น (Up)</span> / <span
                class="highlight">ลง (Down)</span> หรือ <span class="highlight">W</span> / <span
                class="highlight">S</span> เพื่อเล่น!</p>
        <canvas></canvas>
    </div>

    <script src="./script.js"></script>
</body>

</html>
